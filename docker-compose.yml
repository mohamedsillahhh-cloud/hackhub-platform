version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hackhub-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackhub_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hackhub}
    ports:
      - "5432:5432"
    networks:
      - hackhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and real-time
  redis:
    image: redis:7-alpine
    container_name: hackhub-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hackhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackhub-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hackhub}:${POSTGRES_PASSWORD:-hackhub_secret}@postgres:5432/${POSTGRES_DB:-hackhub}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hackhub-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackhub-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    networks:
      - hackhub-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hackhub-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - hackhub-network

networks:
  hackhub-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_data:
